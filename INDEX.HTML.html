<script type="application/json" id="exam-data">{"grammar":[["Each of the students in this class always ______ breakfast before going to school.",["eat","eats","have eaten","has eaten"],1],["A few cups ______ by the children, and the rest were washed by their mother.",["has been broken","have been broken","were broken","was broken"],2],["A new design, created by Mr. Sok, ______ currently being tested, and the results look promising.",["is","are","has been","have been"],0],["Neither Dara nor his friends ______ about the change in the meeting time.",["is informed","are informed","has informed","have informed"],1],["______ who suggested building a new library for the school last year.",["The teacher","It was the teacher","When the teacher","Although the teacher"],1],["Mealea opened a wooden box ______ old photographs and felt very surprised.",["which filled","filling with","filled with","which filling"],2],["Not only ______ the test early, but he also helped his classmates with their questions.",["Pisey finished","Pisey did finish","finished Pisey","did Pisey finish"],3],["In front of the old temple ______ that has stood for over a hundred years.",["standing a stone statue","a stone statue stands","does a stone statue stand","stands a stone statue"],3],["While I was doing my homework, the internet suddenly ______ off, and I lost all my work.",["has gone","was going","went","had gone"],2],["Bopha usually walks to school in the morning, but today she ______ to school because it is raining.",["drives","is driving","will drive","will be driving"],1],["As a music lover, Sokha ______ many concerts. He always posts pictures of them online.",["has attended","attended","attends","has been attended"],0],["By next month, the workers ______ on this bridge for six months.",["will work","will have been working","will be working","are working"],1],["I think my brother and I ______ a short trip next weekend, but I need to check first.",["will take","are going to take","are taking","take"],1],["After the meeting, the manager explained to the staff about ______ for the new project.",["what they have to do","what do they have to do","that they have to do","that do they have to do"],0],["______ the weather was bad, the football match still took place as planned.",["However","Even though","Despite","Regardless"],1],["Sothy thought his English was ______ than his classmates' because he studied abroad for a year.",["gooder","more better","better","more good"],2],["I can't believe you ate ______ as I did, but you only had a small plate, while I had three!",["as many food","more food","as more food","as much food"],3],["Vibol, who is very careful in the lab, accidentally burned ______ while mixing the chemicals.",["him","themselves","itself","himself"],3],["After studying at the library all afternoon, ______ decided to get some ice cream.",["Sophea and I","Sophea and me","me and Sophea","I and Sophea"],0],["The shop did not have ______ shirts in my size, so I had to look somewhere else.",["plenty","enough","enough of","as many"],1],["Nita adopted a ______ kitten from the shelter last week.",["friendly small black","small friendly black","black small friendly","friendly black small"],0],["Although he studies hard, Pisey still has ______ knowledge about computer programming.",["much","little","more","few"],1],["Could you wait ______ moment? I need to find ______ right page in this book.",["ø … an","a … the","ø … ø","a … an"],1],["To find ______ best route to the city, you should check a map and ask ______ local people for advice.",["a … an","the … ø","ø … the","a … the"],1],["For instance, ______ capital of Cambodia is Phnom Penh, so you should write it in ______ space provided.",["the … the","ø … the","the … an","an … the"],0],["It is surprising that a young child can repeat a song without understanding the words ______.",["fully","really well","entirely well","very much"],0],["During the show, the dancers performed ______, so the audience clapped loudly.",["with great energy","greatly energetic","with energy greatly","with greatly energy"],0],["We sent our application a week ago, but we haven't ______ received a reply.",["already","still","yet","only"],2],["During the summer break, Channary learned baking, and she has made some cakes ______ her neighbors.",["to","for","at","of"],1],["Ratha was very upset ______ his friend because he had broken his promise to come to the party.",["in","at","about","with"],3],["The teacher asked the class to set up a small group to talk ______ the school trip next week.",["on","in","about","ø"],2],["The homework tonight is quite long, but I will try ______ it before dinner so I have free time later.",["completing","complete","to complete","to completing"],2],["After hearing her sing for the first time, I couldn't help ______ amazed by her talent.",["be","to be","being","to being"],2],["If you had studied harder for the test, you ______ in the top group now.",["are","will be","would be","would have been"],2],["I can't believe you quit the team just because your friend asked you to. If I ______ you, I would have stayed.",["am","was","were","had been"],2],["After weeks of riding a bike with a flat tire, Somnang finally had it ______ at the shop.",["fix","fixing","fixed","to fix"],2],["My little brother is so persuasive; he managed to get my mother ______ him a new video game.",["buy","bought","buying","to buy"],3],["The main features of the new park include a big playground, walking paths, ______, and a small lake.",["trees are tall","tall trees","tallly treed","are treed tall"],1],["Sopheak not only finished the project early ______ it with great care and creativity.",["but also presents","also presented","but also presented","but presenting"],2],["Drinking enough water, ______, and sleeping well are simple habits for staying healthy.",["exercising daily","do daily exercise","daily do exercising","doing exercising"],0]],"vocabA":[["The scientists need to study the data carefully before making a conclusion.",["ignore","examine","guess","collect"],1],["I get reminders on my phone to drink water every two hours.",["messages","alerts","warnings","instructions"],1],["She made a wise choice to save money instead of buying new clothes.",["silly","quick","sensible","emotional"],2],["To get the discount, customers need to sign up for the store's membership card.",["invite","register","join in","ask"],1],["The family spent extravagantly on their holiday, staying in expensive hotels.",["carefully","lavishly","modestly","thriftily"],1],["The passengers became annoyed and tired after waiting for the delayed flight for hours.",["excited","frustrated","relieved","confident"],1],["The students tried to imitate the teacher's handwriting style in their notebooks.",["copy","invent","improve","ignore"],0],["The new law controls the number of people who come to live in the country.",["emigrants","immigrants","tourists","visitors"],1],["Losing your job suddenly is a serious problem.",["a piece of cake","no laughing matter","a chip off the old block","a pain in the neck"],1],["Some students failed the course because they did not attend without telling anyone.",["built castles in the air","got into hot water","took French leave","played with fire"],2]],"vocabB":[["The car hit a ______ who was crossing the street.",["pedestrian","cyclist","driver","passenger"],0],["Because of low sales, the company decided to ______ several employees.",["laid down","laid up","laid over","laid off"],3],["Due to hunting and habitat loss, elephants are now ______ to extinction.",["harmful","dangerous","vulnerable","exposed"],2],["I want to express my ______ thanks for your help during my illness.",["strong","sincere","fake","halfhearted"],1],["The news reported that the car ______ on the highway was caused by heavy rain.",["accident","collision","smash","impact"],0],["He is very ______ to pass the exam, so he studies every night.",["organized","creative","motivated","delighted"],2],["I ______ regret missing my best friend's wedding because I was sick.",["deeply","eagerly","greatly","blindingly"],0],["Before opening the account, the bank must ______ your identity with a valid ID.",["develop","forge","create","verify"],3],["Many countries spoke out to ______ the attack and asked for peace.",["endorse","deny","condemn","reject"],2],["He worked hard to increase his ______ by selling handmade crafts online.",["revenue","income","price","tax"],1]],"vocabC":["Recycling is an important way to protect the environment. It involves turning waste (61) ______ into new products instead of throwing them away. Recycling helps to (62) ______ pollution, save energy, and protect natural resources such as trees and water.","One of the most common materials that people recycle is paper. Paper can be (63) ______ several times before it becomes too weak to use again. Other materials like plastic, glass, and metal can also be recycled, but each one needs a different (64) ______ to turn it into something new.","Many cities now have programs that (65) ______ people to separate their rubbish into different bins. This makes it easier for recycling centers to (66) ______ the materials and send them to factories for processing.","Recycling also (67) ______ the amount of waste sent to landfills, which can take up a lot of land and cause environmental problems. In addition, making new products from recycled materials usually uses (68) ______ energy than making them from raw materials.","Despite the benefits, recycling still faces some (69) ______, such as the high cost of building recycling facilities and the lack of public awareness. Governments and schools should continue to (70) ______ people about the importance of recycling for future generations."],"vocabCQ":[[61,["materials","goods","items","devices"],0],[62,["automate","reduce","use","copy"],1],[63,["recycled","created","wasted","removed"],0],[64,["process","machine","result","plan"],0],[65,["force","allow","encourage","order"],2],[66,["sort","observe","classify","divide"],0],[67,["increases","produces","reduces","ignores"],2],[68,["less","more","equal","fewer"],0],[69,["solutions","challenges","benefits","opinions"],1],[70,["blame","educate","punish","ignore"],1]],"readingA":[["Plastic pollution is a serious problem for oceans around the world. Many sea animals get hurt or die because of plastic waste. It is important for people to reduce their use of plastic. We can start by ______.",["using reusable bags","buying more plastic bottles","throwing trash into rivers","ignoring the problem"],0],["In the past, very few people had personal computers at home. By the 1990s, computers became cheaper and more common. After that, many families also ______.",["stopped using computers","could not afford computers","bought computers for their homes","sold their old computers"],2],["In the final years of her career, the singer lost her voice and could no longer perform live. Earlier, she always tested her songs by singing them herself. Later, however, she could not do that. When she wrote new songs, she had to ______.",["ask a friend to sing them","hum them quietly to herself","record them with a machine","imagine them in her head"],3],["It takes more effort to change old habits than to build new ones from scratch. People often return to familiar routines, even bad ones, without realizing it. That is why we sometimes say, \"Old habits ______.\"",["are easy to break","die hard","never start","are always good"],1],["There are not enough hospital beds in the city. Hundreds of patients have to wait for treatment. The local government tries to help by building temporary clinics. Patients can use these clinics ______.",["because clinics are better than hospitals","with private rooms","because they do not want hospitals","until permanent hospitals are built"],3],["Smartphones have changed the way people spend their free time. Many apps and games are designed to keep users online for as long as possible. However, this has a downside. Many people now spend so much time on their phones that it leads to ______.",["better sleep","less face-to-face communication","higher productivity","improved memory"],1],["The cane toad is a large toad that was brought to Australia to control insects on sugar farms. The toads have no natural predators there. Since their arrival, the cane toad population has grown out of control and harmed native frogs and small animals. Thus, even bringing in a single animal species ______.",["can solve every farming problem","always helps the local ecosystem","can seriously damage the local ecosystem","has no effect on nature"],2]],"passage1":["For centuries, people have enjoyed cold, sweet treats, but ice cream as we know it today took a long time to develop. Early forms of frozen desserts were made by mixing snow or ice with fruit juice or honey. Wealthy families in ancient China and Persia are believed to have enjoyed these icy mixtures thousands of years ago. Because ice was difficult to store, only rich households could afford such a luxury.","By the sixteenth century, cooks in Europe had learned to mix cream, sugar, and flavorings, then freeze the mixture using a bowl of ice and salt. The salt lowered the temperature of the ice, so it could freeze the cream mixture more quickly. This method, although slow and tiring, produced a smoother dessert than earlier versions made only with fruit and ice.","The invention of the hand-cranked ice cream maker in the nineteenth century changed everything. Instead of stirring the mixture by hand for a long time, people could turn a handle to mix and freeze the cream at the same time. This device, usually made of wood on the outside and metal on the inside, made ice cream easier and faster to prepare at home. As a result, ice cream became more common among ordinary families, not just the wealthy.","Today, ice cream is produced on a huge scale in factories using large freezing machines. However, some people still prefer to make ice cream by hand, believing that the slower process creates a richer flavor and a smoother texture than machine-made versions."],"passage1Q":[["Which of the following aspects of the history of food does the passage mainly discuss?",["The invention of refrigerators","The development of ice cream","The use of salt in cooking","The types of fruit used in desserts"],1],["The author mentions ancient China and Persia to illustrate ______.",["how early frozen desserts were only for the wealthy","that ice cream was invented there","that these countries had the coldest climates","how modern ice cream factories began"],0],["The word \"luxury\" in the first paragraph is closest in meaning to ______.",["necessity","special treat","punishment","mistake"],1],["The word \"it\" in the second paragraph is closest in meaning to ______.",["the cream mixture","the ice","the salt","the bowl"],1],["According to the passage, how was the cream mixture frozen in sixteenth-century Europe?",["By placing it directly in a refrigerator","By using a hand-cranked machine","By mixing it with hot water","By placing it in a bowl of ice and salt"],3],["The word \"device\" in the third paragraph is closest in meaning to ______.",["recipe","machine","ingredient","flavor"],1],["Which of the following is mentioned in the third paragraph as a benefit of the hand-cranked ice cream maker?",["It made ice cream available to ordinary families.","It used less sugar than before.","It was cheaper than buying ice cream in stores.","It worked without any ice at all."],0],["It can be inferred from the third paragraph that, before the hand-cranked machine was invented, making ice cream ______.",["required no cream at all","took a long time and effort","was done only in factories","used no ice or salt"],1],["According to the fourth paragraph, all of the following are true EXCEPT ______.",["Ice cream today is mostly made in factories","Large machines are used in modern production","Everyone agrees that machine-made ice cream tastes best","Some people still prefer to make ice cream by hand"],2],["According to the passage, which of the following was an advantage of making ice cream by hand, according to some people?",["It is faster than using a machine.","It produces a richer flavor and smoother texture.","It requires no cream or sugar.","It can be done without any freezing process."],1]],"passage2":["The bicycle changed the way ordinary people traveled in the nineteenth century. Before bicycles became common, most people who could not afford a horse had to walk everywhere they went. “For the common man,” wrote one inventor at the time, “the bicycle is what the horse once was for the rich — a way to travel far without great cost.” Because bicycles were affordable and did not need to be fed like a horse, they quickly became popular among workers and students.","At first, bicycles were difficult and dangerous to ride. Early models, known as “penny-farthings,” had a very large front wheel and a tiny back wheel, making them easy to tip over. It was not until 1885 that John Kemp Starley introduced the “safety bicycle,” which had two wheels of equal size and a chain connected to the back wheel. This design was much more stable, and within a few years, it had replaced the penny-farthing almost completely."],"passage2Q":[["What is the main topic of the passage?",["The cost of owning a horse in the nineteenth century","The development of the bicycle as transportation","The danger of riding penny-farthings","John Kemp Starley's life story"],1],["The word \"common\" in the first paragraph is closest in meaning to which of the following?",["rare","wealthy","ordinary","foreign"],2],["The expression \"a way to travel far without great cost\" in the first paragraph is closest in meaning to which of the following?",["an expensive form of transportation","an affordable form of transportation","a slow form of transportation","a dangerous form of transportation"],1],["Which of the following can be inferred from what the inventor said?",["Horses were no longer used by the rich.","Bicycles were originally designed only for the wealthy.","Owning a horse was expensive for ordinary people.","Bicycles were more dangerous than horses."],2],["It can be inferred that the phrase \"the common man\" in the first paragraph refers to ______.",["wealthy horse owners","ordinary working people","bicycle inventors","government officials"],1],["What point is the author making by stating that early bicycles were \"difficult and dangerous to ride\"?",["Bicycles were never popular.","The first bicycle designs had safety problems.","People preferred walking to riding bicycles.","Penny-farthings were more comfortable than modern bikes."],1],["Why did the penny-farthing design get replaced?",["It was too expensive to produce.","The safety bicycle was more stable and safer.","People stopped wanting bicycles altogether.","The chain mechanism was removed."],1]],"headingsList":[["A","Complaints about the impact of a certain approach"],["B","Fundamental beliefs that are in fact incorrect"],["C","Early recommendations concerning education"],["D","Schools that put a new approach into practice"],["E","Schools that have suffered from changing their approach"],["F","What students are increasingly expected to do"],["G","How to achieve outcomes that are currently impossible"],["H","Neither approach guarantees continuous improvement"],["I","Evidence that a certain approach can have more disadvantages than advantages"]],"headingsPassage":[{"num":"0","letter":"F","text":"Getting things right is big business in education today. Whether it is exam results, homework, or class rankings, schools spend enormous effort making sure students avoid mistakes. We have more tests, grades, and rules than ever before, all designed to push students toward “correct” answers. Students are told that they must get things right the first time in order to succeed, and parents pay for extra classes and tutors to help make this happen."},{"num":"0","letter":"A","text":"This idea has also shaped the way many teachers think about their classrooms, much to the relief of strict teachers who want every answer to be perfect. The number of test-preparation centers has grown rapidly over the past twenty years, mostly teaching students how to avoid errors.\n\n Ironically, however, the number of students who feel afraid of trying new things has also increased. Stress related to exams has grown. A large number of students from different backgrounds say they feel anxious about being wrong in front of their classmates."},{"num":"95","letter":null,"text":"New research suggests that the constant push for correctness is based on a mistaken belief — the idea that mistakes always harm learning. In fact, this assumption itself may be the real problem, not the teaching methods schools use. As a result, students spend so much energy trying to avoid errors that they stop taking the kind of risks that lead to real understanding."},{"num":"96","letter":null,"text":"Studies comparing strict and relaxed classrooms found that overly strict correction can actually backfire. Students who feared making mistakes performed worse on creative tasks than those who were allowed to experiment freely, showing that being too strict can sometimes cause more harm than good."},{"num":"97","letter":null,"text":"To help students reach levels of creativity and understanding that strict, error-free classrooms cannot produce, many experts now recommend allowing students to experiment and make mistakes without harsh punishment, especially when they are learning something completely new."},{"num":"98","letter":null,"text":"Some schools have already begun applying this idea. A primary school in Finland, for example, lets students redo tests without penalty, focusing on what they learned rather than their first score. A number of schools in Australia have introduced “growth mindset” programs that encourage students to see mistakes as useful feedback rather than failure."},{"num":"99","letter":null,"text":"This is not an entirely new idea. As early as the 1960s, some educational theorists recommended that schools spend less time correcting errors and more time encouraging curiosity, although their advice was largely ignored at the time."},{"num":"100","letter":null,"text":"A word of caution to schools thinking about following this trend: the evidence so far suggests that being too relaxed about mistakes, like being too strict, also has limits and may even harm learning if taken too far. Neither strict correction nor complete tolerance for mistakes guarantees that students will keep improving forever. Schools should always question whether their current methods of teaching truly work."}],"headingsAnswers":{"95":"B","96":"I","97":"G","98":"D","99":"C","100":"H"}}
</script>
<style>
  :root{
    --paper:#F8F4EA;
    --paper-deep:#F1EBDC;
    --ink:#1C2541;
    --ink-soft:#3C4566;
    --rule:#D9D2C0;
    --gold:#A8761E;
    --gold-soft:#E8D9B8;
    --good:#2F7A4D;
    --good-bg:#E5F1E8;
    --bad:#B23A2E;
    --bad-bg:#FBEAE7;
    --serif: 'Iowan Old Style','Palatino Linotype','Book Antiqua',Georgia,serif;
    --sans: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:var(--sans);
    background:var(--paper);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  #app{height:100vh;display:flex;flex-direction:column;}

  /* ---------- START SCREEN ---------- */
  .start-wrap{
    flex:1;display:flex;align-items:center;justify-content:center;
    padding:24px;overflow-y:auto;
  }
  .start-card{
    max-width:620px;width:100%;
    background:#fff;
    border:1px solid var(--rule);
    border-radius:4px;
    box-shadow:0 1px 3px rgba(28,37,65,0.08);
    overflow:hidden;
  }
  .start-band{
    background:var(--ink);
    color:var(--paper);
    padding:28px 32px 22px;
    border-bottom:3px solid var(--gold);
  }
  .start-band .eyebrow{
    font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--gold-soft);margin:0 0 6px;font-weight:600;
  }
  .start-band h1{
    font-family:var(--serif);
    font-size:28px;margin:0 0 4px;font-weight:600;
  }
  .start-band p.sub{margin:0;color:#C9CEDD;font-size:14px;}
  .start-body{padding:28px 32px 32px;}
  
  .sections-table{width:100%;border-collapse:collapse;margin:18px 0 22px;font-size:13.5px;}
  .sections-table th,.sections-table td{
    border-bottom:1px solid var(--rule);padding:7px 4px;text-align:left;
  }
  .sections-table th{color:var(--ink-soft);font-weight:600;text-transform:uppercase;font-size:11px;letter-spacing:.05em;}
  .sections-table td.num{text-align:right;font-variant-numeric:tabular-nums;}
  .sections-table tr.total td{font-weight:700;border-top:2px solid var(--ink);border-bottom:none;}
  
  .start-btn{
    width:100%;padding:13px;font-size:15px;font-weight:600;border:none;border-radius:3px;
    background:var(--gold);color:#fff;cursor:pointer;letter-spacing:.02em;
    transition:background .15s ease;
  }
  .start-btn:hover{background:#8E611A;}
  .start-note{font-size:12px;color:var(--ink-soft);margin-top:14px;text-align:center;}

  /* ---------- TOP BAR ---------- */
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    background:var(--ink);color:var(--paper);
    padding:12px 20px;flex-wrap:wrap;gap:8px;border-bottom:3px solid var(--gold);
    z-index:20;
  }
  .topbar .tb-left{display:flex;flex-direction:column;line-height:1.25;}
  .topbar .tb-title{font-family:var(--serif);font-size:17px;font-weight:600;}
  .topbar .tb-sub{font-size:11.5px;color:#B9BFD3;margin-top:2px;}
  .topbar .tb-right{display:flex;align-items:center;gap:14px;}
  .live-score{
    font-size:15px;font-weight:700;background:rgba(255,255,255,0.12);
    padding:6px 12px;border-radius:3px;letter-spacing:0.02em;
  }

  /* ---------- BLOCK NAV ---------- */
  .blocknav{
    display:flex;gap:4px;overflow-x:auto;background:var(--paper-deep);
    padding:8px 16px;border-bottom:1px solid var(--rule);flex-wrap:nowrap;
  }
  .blocknav button{
    flex:none;padding:7px 12px;font-size:12.5px;border:1px solid transparent;
    background:transparent;color:var(--ink-soft);border-radius:3px;cursor:pointer;
    white-space:nowrap;font-family:var(--sans);font-weight:600;
  }
  .blocknav button.active{background:var(--ink);color:#fff;}
  .blocknav button .count{font-weight:400;opacity:.75;margin-left:4px;}

  /* ---------- SPLIT INTERFACE ---------- */
  .split{flex:1;display:flex;overflow:hidden;min-height:0;}
  .panel-left{
    width:42%;background:var(--paper-deep);border-right:1px solid var(--rule);
    overflow-y:auto;padding:26px 30px 60px;
  }
  .panel-right{
    width:58%;overflow-y:auto;padding:26px 32px 80px;
  }
  .left-eyebrow{
    font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--gold);
    font-weight:700;margin-bottom:8px;
  }
  .left-title{font-family:var(--serif);font-size:21px;margin:0 0 14px;color:var(--ink);}
  .instr-box{
    background:#fff;border:1px solid var(--rule);border-left:4px solid var(--gold);
    padding:14px 16px;font-size:13.5px;line-height:1.55;color:var(--ink-soft);border-radius:2px;
  }
  .passage-text p{
    font-family:var(--serif);font-size:15.5px;line-height:1.75;color:var(--ink);
    margin:0 0 16px;
  }
  .heading-list{margin-top:18px;background:#fff;border:1px solid var(--rule);padding:14px 16px;border-radius:2px;}
  .heading-list h4{margin:0 0 10px;font-size:12.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);}
  .heading-list .h-item{font-size:13.5px;margin-bottom:6px;line-height:1.4;}
  .heading-list .h-item b{color:var(--gold);}

  /* ---------- INTERACTIVE INSTANT CARDS ---------- */
  .q-card{
    background:#fff;border:1px solid var(--rule);border-radius:3px;
    padding:16px 18px;margin-bottom:18px;transition:all 0.2s ease;
  }
  .q-card .q-stem{font-size:14.5px;line-height:1.6;margin-bottom:12px;color:var(--ink);}
  .q-card .q-stem .qn{font-weight:700;color:var(--gold);margin-right:4px;}
  .opts{display:flex;flex-direction:column;gap:7px;}
  
  .opt-label{
    display:flex;align-items:flex-start;gap:9px;padding:9px 11px;border:1px solid var(--rule);
    border-radius:3px;cursor:pointer;font-size:13.8px;line-height:1.45;transition:all 0.1s ease;
  }
  .opt-label input{margin-top:2px;accent-color:var(--gold);}
  .opt-letter{font-weight:700;color:var(--ink-soft);margin-right:2px;}

  /* Active Interactive Feedback States */
  .opt-label.disabled{pointer-events:none;}
  .opt-label.correct-flash{
    background-color:var(--good-bg) !important;
    border-color:var(--good) !important;
    color:var(--good) !important;
    font-weight:600;
  }
  .opt-label.incorrect-flash{
    background-color:var(--bad-bg) !important;
    border-color:var(--bad) !important;
    color:var(--bad) !important;
    opacity:0.85;
  }

  select.heading-select{
    width:100%;padding:9px 10px;font-size:14px;border:1px solid var(--rule);border-radius:3px;
    background:#fff;font-family:var(--sans);color:var(--ink);
  }
  select.heading-select:disabled{
    color:var(--ink);background-color:#fafafa;font-weight:600;
  }
  select.heading-select.correct-flash{border:2px solid var(--good);background-color:var(--good-bg);}
  select.heading-select.incorrect-flash{border:2px solid var(--bad);background-color:var(--bad-bg);}

  /* Feedback box rendered dynamically */
  .feedback-box {
    margin-top:12px;padding:10px 14px;border-radius:3px;font-size:13.2px;line-height:1.5;
    animation: slideIn 0.2s ease-out;
  }
  .feedback-box.correct {background:var(--good-bg);border-left:4px solid var(--good);color:var(--ink);}
  .feedback-box.incorrect {background:var(--bad-bg);border-left:4px solid var(--bad);color:var(--ink);}

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-5px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .nav-buttons{display:flex;justify-content:space-between;margin-top:22px;gap:10px;}
  .nav-buttons button{
    padding:10px 18px;border-radius:3px;border:1px solid var(--ink);background:#fff;color:var(--ink);
    font-size:13px;font-weight:600;cursor:pointer;
  }
  .nav-buttons button.primary{background:var(--ink);color:#fff;}
  .nav-buttons button:disabled{opacity:.35;cursor:not-allowed;}

  @media (max-width:860px){
    .split{flex-direction:column;overflow-y:auto;}
    .panel-left,.panel-right{width:100%;height:auto;overflow-visible:initial;}
    .panel-left{border-right:none;border-bottom:1px solid var(--rule);}
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
const EXAM = JSON.parse(document.getElementById('exam-data').textContent);
const LETTERS = ['A','B','C','D'];

function buildBlocks(){
  const blocks = [];

  blocks.push({
    id:'grammar', label:'I. Grammar', kind:'mcq',
    instructions:'Questions 1 to 40: select your answer. You will get instant validation with details immediately.',
    startNum:1,
    questions: EXAM.grammar.map(([stem,opts,ans])=>({stem,opts,ans}))
  });

  blocks.push({
    id:'vocabA', label:'II.A Vocabulary', kind:'mcq',
    instructions:'Questions 41 to 50: choose the option (A, B, C, or D) that is closest in meaning to the underlined words or phrases.',
    startNum:41,
    questions: EXAM.vocabA.map(([stem,opts,ans])=>({stem,opts,ans}))
  });

  blocks.push({
    id:'vocabB', label:'II.B Vocabulary', kind:'mcq',
    instructions:'Questions 51 to 60: choose the option (A, B, C, or D) that best completes the gap in each sentence.',
    startNum:51,
    questions: EXAM.vocabB.map(([stem,opts,ans])=>({stem,opts,ans}))
  });

  blocks.push({
    id:'vocabC', label:'II.C Cloze', kind:'mcq', passageTitle:'Recycling',
    instructions:'Questions 61 to 70: read the passage and choose the best word to fill each corresponding gap.',
    passage: EXAM.vocabC,
    startNum:61,
    questions: EXAM.vocabCQ.map(([num,opts,ans])=>({stem:'Question '+num,opts,ans,num}))
  });

  blocks.push({
    id:'readingA', label:'III.A Reading', kind:'mcq',
    instructions:'Questions 71 to 77: choose the one answer (A, B, C, or D) that best completes each paragraph.',
    startNum:71,
    questions: EXAM.readingA.map(([stem,opts,ans])=>({stem,opts,ans}))
  });

  blocks.push({
    id:'passage1', label:'III.B Passage I', kind:'mcq', passageTitle:'Passage I \u2014 The History of Ice Cream',
    instructions:'Questions 78 to 87: read Passage I, then choose the best answer to each question.',
    passage: EXAM.passage1,
    startNum:78,
    questions: EXAM.passage1Q.map(([stem,opts,ans])=>({stem,opts,ans}))
  });

  blocks.push({
    id:'passage2', label:'III.B Passage II', kind:'mcq', passageTitle:'Passage II \u2014 The History of the Bicycle',
    instructions:'Questions 88 to 94: read Passage II, then choose the best answer to each question.',
    passage: EXAM.passage2,
    startNum:88,
    questions: EXAM.passage2Q.map(([stem,opts,ans])=>({stem,opts,ans}))
  });

  blocks.push({
    id:'headings', label:'III.C Headings', kind:'heading', passageTitle:'Why Schools Should Welcome Mistakes',
    instructions:'Questions 95 to 100: choose one heading (A\u2013I) from the list that best summarizes each numbered part of the passage.',
    headingsList: EXAM.headingsList,
    headingsPassage: EXAM.headingsPassage,
    startNum:95,
    questions: [95,96,97,98,99,100].map(n=>({num:n, ans: EXAM.headingsAnswers[n]}))
  });

  return blocks;
}

const BLOCKS = buildBlocks();
const TOTAL_QUESTIONS = 100;

let state = {
  screen:'start', // start | practice
  blockIdx:0,
  userResponses: {}, // questionNumber -> { chosenIdx/Letter, isCorrect }
  score: 0,
  answeredTotal: 0
};

const app = document.getElementById('app');

function render(){
  if(state.screen==='start') return renderStart();
  if(state.screen==='practice') return renderPractice();
}

function renderStart(){
  app.innerHTML = `
  <div class="start-wrap">
    <div class="start-card">
      <div class="start-band">
        <p class="eyebrow">IFL Entrance Practice Hub</p>
        <h1>IFL Mock Entrance Examination 4</h1>
        <p class="sub">Interactive Self-Study App with Instant Key Feedback</p>
      </div>
      <div class="start-body">
        <p style="margin:0 0 16px 0; font-size:14.5px; line-height:1.5; color:var(--ink-soft);">
          Welcome! This diagnostic program turns all 100 exercises into an interactive tool. Selecting an answer provides <b>immediate corrections</b> alongside the correct solutions.
        </p>
        <table class="sections-table">
          <tr><th>Section Category</th><th>Question Range</th><th>Items</th></tr>
          <tr><td>I. Grammar Focus</td><td class="num">1 &ndash; 40</td><td class="num">40</td></tr>
          <tr><td>II. Vocabulary &amp; Cloze Context</td><td class="num">41 &ndash; 70</td><td class="num">30</td></tr>
          <tr><td>III. Reading Comprehension &amp; Headings</td><td class="num">71 &ndash; 100</td><td class="num">30</td></tr>
          <tr class="total"><td>Total Database Space</td><td class="num">1 &ndash; 100</td><td class="num">100</td></tr>
        </table>
        <button class="start-btn" id="startBtn">Launch Interactive Exercises</button>
        <p class="start-note">Work through at your own pace. Progress updates in real-time above.</p>
      </div>
    </div>
  </div>`;

  document.getElementById('startBtn').addEventListener('click', ()=>{
    state.screen = 'practice';
    render();
  });
}

function renderPractice(){
  const block = BLOCKS[state.blockIdx];

  // Generate top block navigation bar tabs
  const navHtml = BLOCKS.map((b,i)=>{
    const solvedInBlock = b.questions.filter(q=>{
      const n = b.id === 'headings' ? q.num : (q.num || b.startNum + b.questions.indexOf(q));
      return state.userResponses[n] !== undefined;
    }).length;
    return `<button data-blk="${i}" class="${i===state.blockIdx?'active':''}">${b.label}<span class="count">(${solvedInBlock}/${b.questions.length})</span></button>`;
  }).join('');

  // Generate left info column
  let leftHtml = `<div class="left-eyebrow">Directives</div><div class="left-title">${block.label}</div><div class="instr-box">${block.instructions}</div>`;

  if(block.passage){
    leftHtml += `<div class="left-eyebrow" style="margin-top:22px;">${block.passageTitle||'Passage Reference'}</div>`;
    leftHtml += `<div class="passage-text">` + block.passage.map(p=>`<p>${p}</p>`).join('') + `</div>`;
  }

  if(block.id==='headings'){
    leftHtml += `<div class="heading-list"><h4>A List of Headings</h4>` +
      block.headingsList.map(([l,t])=>`<div class="h-item"><b>${l}.</b> ${t}</div>`).join('') + `</div>`;
    leftHtml += `<div class="passage-text" style="margin-top:18px;">` +
      block.headingsPassage.map(item=>{
        const label = item.letter? `${item.num} <b style="color:var(--good)">(${item.letter})</b>` : `<span class="pnum">${item.num}</span>`;
        const paras = item.text.split('\n\n').map(t=>`<p>${t}</p>`).join('');
        return `<p style="margin-bottom:4px;"><strong>${label}</strong></p>` + paras;
      }).join('') + `</div>`;
  }

  // Generate right workspace options column
  let rightHtml = '';
  if(block.kind==='mcq'){
    rightHtml = block.questions.map((q,i)=>{
      const n = q.num || (block.startNum + i);
      const response = state.userResponses[n];
      
      let itemsHtml = '';
      q.opts.forEach((opt, oi) => {
        let stateClass = '';
        if (response) {
          if (oi === q.ans) {
            stateClass = 'correct-flash disabled';
          } else if (response.chosenIdx === oi) {
            stateClass = 'incorrect-flash disabled';
          } else {
            stateClass = 'disabled';
          }
        }
        
        itemsHtml += `
          <label class="opt-label ${stateClass}">
            <input type="radio" name="q${n}" value="${oi}" ${response && response.chosenIdx===oi?'checked':''} ${response?'disabled':''}>
            <span><span class="opt-letter">${LETTERS[oi]}.</span> ${opt}</span>
          </label>`;
      });

      let feedbackBoxHtml = '';
      if (response) {
        if (response.isCorrect) {
          feedbackBoxHtml = `<div class="feedback-box correct"><b>Correct!</b> Excellent choice.</div>`;
        } else {
          feedbackBoxHtml = `<div class="feedback-box incorrect"><b>Incorrect.</b> The correct answer is <b>${LETTERS[q.ans]}</b>: "${q.opts[q.ans]}".</div>`;
        }
      }

      return `
      <div class="q-card" id="card-${n}">
        <div class="q-stem"><span class="qn">${n}.</span>${q.stem.replace(/^Question \d+$/,'')}</div>
        <div class="opts" data-qnum="${n}">${itemsHtml}</div>
        ${feedbackBoxHtml}
      </div>`;
    }).join('');

  } else if(block.kind==='heading'){
    rightHtml = block.questions.map(q=>{
      const response = state.userResponses[q.num];
      let selectClass = '';
      
      if(response) {
        selectClass = response.isCorrect ? 'correct-flash' : 'incorrect-flash';
      }

      const optsHtml = block.headingsList.map(([l,t])=>`
        <option value="${l}" ${response && response.chosenIdx===l?'selected':''}>${l} \u2014 ${t}</option>
      `).join('');

      let feedbackBoxHtml = '';
      if(response) {
        if(response.isCorrect) {
          feedbackBoxHtml = `<div class="feedback-box correct"><b>Correct!</b> Paragraph matching verified successfully.</div>`;
        } else {
          const correctTitle = block.headingsList.find(([l])=>l===q.ans)[1];
          feedbackBoxHtml = `<div class="feedback-box incorrect"><b>Incorrect.</b> The optimal structural heading is <b>${q.ans}</b>: "${correctTitle}".</div>`;
        }
      }

      return `
      <div class="q-card" id="card-${q.num}">
        <div class="q-stem"><span class="qn">${q.num}.</span>Identify structural heading for Paragraph ${q.num}:</div>
        <select class="heading-select ${selectClass}" data-qnum="${q.num}" ${response?'disabled':''}>
          <option value="">Choose Paragraph ${q.num} Heading...</option>
          ${optsHtml}
        </select>
        ${feedbackBoxHtml}
      </div>`;
    }).join('');
  }

  const isFirst = state.blockIdx === 0;
  const isLast = state.blockIdx === BLOCKS.length - 1;

  app.innerHTML = `
    <div class="topbar">
      <div class="tb-left">
        <div class="tb-title">IFL Mock Entrance Practice Environment</div>
        <div class="tb-sub">Dynamic Interactive Evaluation Deck</div>
      </div>
      <div class="tb-right">
        <div class="live-score">Score: ${state.score} / ${state.answeredTotal} Checked</div>
      </div>
    </div>
    <div class="blocknav" id="blocknav">${navHtml}</div>
    <div class="split">
      <div class="panel-left">${leftHtml}</div>
      <div class="panel-right">
        ${rightHtml}
        <div class="nav-buttons">
          <button id="prevBtn" ${isFirst?'disabled':''}>&larr; Previous Category</button>
          ${isLast ? '<button class="primary" id="resetProgBtn">Reset Practice Data</button>' : '<button class="primary" id="nextBtn">Next Category &rarr;</button>'}
        </div>
      </div>
    </div>`;

  // Section Tab Navigation handlers
  document.getElementById('blocknav').addEventListener('click', e=>{
    const btn = e.target.closest('button[data-blk]');
    if(!btn) return;
    state.blockIdx = parseInt(btn.dataset.blk,10);
    renderPractice();
  });

  document.getElementById('prevBtn')?.addEventListener('click', ()=>{ state.blockIdx--; renderPractice(); });
  document.getElementById('nextBtn')?.addEventListener('click', ()=>{ state.blockIdx++; renderPractice(); });
  document.getElementById('resetProgBtn')?.addEventListener('click', ()=>{
    if(confirm("Are you sure you want to clear all interactive answers and restart?")){
      state.userResponses = {};
      state.score = 0;
      state.answeredTotal = 0;
      state.blockIdx = 0;
      renderPractice();
    }
  });

  // MCQ Selection Event Monitoring
  document.querySelectorAll('.opts').forEach(optsDiv=>{
    optsDiv.addEventListener('change', e=>{
      const qNum = parseInt(optsDiv.dataset.qnum,10);
      const chosenValue = parseInt(e.target.value,10);
      
      // Locate the question metadata block target dynamically
      let blockQ;
      for(let b of BLOCKS) {
        let match = b.questions.find((q, idx) => {
          let n = q.num || (b.startNum + idx);
          return n === qNum;
        });
        if(match) { blockQ = match; break; }
      }

      const isCorrect = chosenValue === blockQ.ans;
      state.userResponses[qNum] = { chosenIdx: chosenValue, isCorrect };
      state.answeredTotal++;
      if(isCorrect) state.score++;

      renderPractice();
      document.getElementById(`card-${qNum}`)?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    });
  });

  // Headings Selection Dropdown Monitoring
  document.querySelectorAll('.heading-select').forEach(sel=>{
    sel.addEventListener('change', e=>{
      const qNum = parseInt(sel.dataset.qnum,10);
      const chosenLetter = e.target.value;
      if(!chosenLetter) return;

      let blockQ = BLOCKS.find(b=>b.id==='headings').questions.find(q=>q.num===qNum);
      const isCorrect = chosenLetter === blockQ.ans;
      
      state.userResponses[qNum] = { chosenIdx: chosenLetter, isCorrect };
      state.answeredTotal++;
      if(isCorrect) state.score++;

      renderPractice();
      document.getElementById(`card-${qNum}`)?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    });
  });
}

render();
</script>
</body>
</html>
